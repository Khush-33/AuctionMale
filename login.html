<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siddhachal Box Cricket — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1e;
    --card: #111827;
    --border: rgba(255,255,255,0.08);
    --accent: #3b82f6;
    --gold: #f59e0b;
    --text: #f1f5f9;
    --muted: #64748b;
  }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(59,130,246,0.12), transparent 70%);
  }
  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    padding: 0 1.5rem;
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 0.5rem;
    filter: drop-shadow(0 0 20px rgba(245,158,11,0.5));
    animation: bounce 2s ease infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--text);
    letter-spacing: 2px;
    line-height: 1;
  }
  .logo p {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 0.35rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }
  .card h2 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .field {
    margin-bottom: 1rem;
  }
  .field label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }
  .field input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .btn-login {
    width: 100%;
    padding: 0.85rem;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-login:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.3); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    font-size: 0.82rem;
    margin-bottom: 1rem;
    display: none;
  }
  .divider {
    display: flex; align-items: center; gap: 1rem;
    margin: 1.5rem 0;
  }
  .divider span { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .btn-view {
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-view:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="container">
  <div class="logo">
    <span class="logo-icon">🏏</span>
    <h1>Siddhachal Box Cricket</h1>
    <p>Auction Management System</p>
  </div>
  <div class="card">
    <h2>Admin Login</h2>
    <div class="error" id="errMsg"></div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="uname" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwd" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="divider"><span>or</span></div>
    <button class="btn-view" onclick="window.location.href='index.html'">👀 Continue as Viewer</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCMDfMPuNxGirRIroAbCUSElsP6JsJ8PEM",
    authDomain: "auctionmales.firebaseapp.com",
    projectId: "auctionmales",
    storageBucket: "auctionmales.firebasestorage.app",
    messagingSenderId: "33238139903",
    appId: "1:33238139903:web:c62d92f5daa4d9a21e5dca",
    measurementId: "G-ZG457T4W9H"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.doLogin = async function() {
    const uname = document.getElementById('uname').value.trim();
    const pwd = document.getElementById('pwd').value;
    const err = document.getElementById('errMsg');
    const btn = document.getElementById('loginBtn');

    if (!uname || !pwd) { showErr('Please enter username and password.'); return; }

    // Map username → email for Firebase Auth
    const emailMap = { 'khush': 'khushjain8419@gmail.com', 'kavish': 'kavish.siroya@gmail.com' };
    const email = emailMap[uname.toLowerCase()];
    if (!email) { showErr('Invalid username.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';

    try {
      await signInWithEmailAndPassword(auth, email, pwd);
      window.location.href = 'index.html?admin=1';
    } catch(e) {
      showErr('Invalid username or password.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  };

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
